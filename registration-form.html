<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <style>
        /* CSS Variables */
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --white: #ffffff;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            color: var(--text-main);
            font-size: 28px;
            font-weight: 700;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 5px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-group {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        input[type="date"],
        select {
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        .gender-options {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .gender-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
        }

        .gender-item input {
            margin-right: 8px;
            accent-color: var(--primary-color);
            width: 18px;
            height: 18px;
        }

        .checkbox-group {
            flex-direction: row;
            align-items: flex-start;
            margin-top: 10px;
        }

        .checkbox-group input {
            margin-right: 10px;
            margin-top: 4px;
            accent-color: var(--primary-color);
            min-width: 18px;
            min-height: 18px;
        }

        .checkbox-group label {
            font-weight: 400;
            font-size: 13px;
            line-height: 1.4;
            color: var(--text-muted);
            cursor: pointer;
        }

        .register-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        .register-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        #messageBox {
            display: none;
            background: #ecfdf5;
            color: #065f46;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #a7f3d0;
            text-align: center;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
            .form-container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>Create Account</h2>
            <p>Join our community today</p>
        </div>

        <div id="messageBox">Registration successful! Welcome aboard.</div>

        <form id="registrationForm" onsubmit="handleSubmit(event)">
            <div class="form-grid">
                <!-- First Name -->
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" placeholder="John">
                </div>

                <!-- Last Name -->
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" placeholder="Doe">
                </div>

                <!-- Email -->
                <div class="form-group full-width">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john.doe@example.com">
                </div>

                <!-- Date of Birth -->
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob">
                </div>

                <!-- Phone Number -->
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="017XXXXXXXX">
                </div>

                <!-- Password -->
                <div class="form-group full-width">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" minlength="8">
                </div>

                <!-- Gender -->
                <div class="form-group full-width">
                    <label>Gender</label>
                    <div class="gender-options">
                        <label class="gender-item">
                            <input type="radio" name="gender" value="Male" > Male
                        </label>
                        <label class="gender-item">
                            <input type="radio" name="gender" value="Female"> Female
                        </label>
                        <label class="gender-item">
                            <input type="radio" name="gender" value="Other"> Other
                        </label>
                    </div>
                </div>

                <!-- District Dropdown -->
                <div class="form-group full-width">
                    <label for="district">District</label>
                    <select id="district" name="district" >
                        <option value="" disabled selected>Select your district</option>
                        <option value="Dhaka">Dhaka</option>
                        <option value="Narayanganj">Narayanganj</option>
                        <option value="Chattogram">Chattogram</option>
                        <option value="Sylhet">Sylhet</option>
                        <option value="Rajshahi">Rajshahi</option>
                        <option value="Khulna">Khulna</option>
                    </select>
                </div>

                <!-- Agreement Checkbox -->
                <div class="form-group full-width checkbox-group">
                    <input type="checkbox" id="terms" name="terms">
                    <label for="terms">I agree to the Terms and Conditions and understand that my data will be handled securely.</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="register-btn full-width">Register Now</button>
            </div>
        </form>
    </div>

</body>

</html>
