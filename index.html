<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 30px 12px;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin: 0 0 18px;
      text-align: center;
      color: #222;
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .field {
      margin-bottom: 14px;
      flex: 1;
    }

    label {
      display: block;
      font-size: 14px;
      color: #333;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #d6d9e0;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      background: #fff;
    }

    input:focus, select:focus {
      border-color: #4f7cff;
      box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.15);
    }

    .gender-box {
      display: flex;
      gap: 18px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid #d6d9e0;
      border-radius: 10px;
    }

    .gender-box label {
      margin: 0;
      font-weight: 500;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .gender-box input {
      width: auto;
      margin: 0;
    }

    .terms {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 13px;
      color: #333;
      line-height: 1.3;
      margin-top: 6px;
    }

    .terms input {
      width: auto;
      margin-top: 2px;
    }

    .terms a {
      color: #4f7cff;
      text-decoration: none;
      font-weight: 600;
    }

    .terms a:hover {
      text-decoration: underline;
    }

    button {
      width: 100%;
      border: none;
      background: #4f7cff;
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
    }

    button:hover {
      background: #3f67e6;
    }

    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
      text-align: center;
    }

    @media (max-width: 520px) {
      .row { flex-direction: column; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Register</h2>

    <form action="#" method="post">
      <div class="row">
        <div class="field">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="first_name" placeholder="Enter first name" required />
        </div>

        <div class="field">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="last_name" placeholder="Enter last name" required />
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required />
      </div>

      <div class="row">
        <div class="field">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" name="dob" required />
        </div>

        <div class="field">
          <label for="phone">Phone Number</label>
          <input type="tel" pattern="[0-9]+" id="phone" name="phone" placeholder="01XXXXXXXXX" required maxlength="15"/>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" minlength="6" required />
      </div>

      <div class="field">
        <label>Gender</label>
        <div class="gender-box">
          <label for="male">
            <input type="radio" id="male" name="gender" value="Male" required />
            Male
          </label>
          <label for="female">
            <input type="radio" id="female" name="gender" value="Female" />
            Female
          </label>
        </div>
      </div>

      <div class="field">
        <label for="district">District</label>
        <select id="district" name="district" required>
          <option value="" selected disabled>Select your district</option>
          <option>Dhaka</option>
          <option>Narayanganj</option>
          <option>Chattogram</option>
          <option>Gazipur</option>
          <option>Sylhet</option>
        </select>
      </div>

      <label class="terms">
        <input type="checkbox" name="terms" required />
        I agree to the <a href="#" target="_blank" rel="noopener">Terms and Conditions</a>.
      </label>

      <button type="submit">Register</button>

      <div class="hint">All fields are required.</div>
    </form>
  </div>
</body>
</html>
